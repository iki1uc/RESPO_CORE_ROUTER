<!DOCTYPE html>
<html>
<head>
    <title>RESPO_CORE_ROUTER – System Router</title>
    <script src="router.js"></script>
</head>

<body>
    <h1>RESPO_CORE_ROUTER</h1>
    <p>Zentraler Router für alle RESPO‑Module.</p>

    <h2>Aktionen</h2>
    <button onclick="Router.route('scan')">Scan starten</button>
    <button onclick="Router.route('ui')">UI aktualisieren</button>
    <button onclick="Router.route('axi')">AXI-Link prüfen</button>
    <button onclick="Router.route('arg')">Argument-Scan</button>
    <button onclick="Router.route('pos')">User-Position</button>
    <button onclick="Router.route('rot')">Rotation</button>
    <button onclick="Router.route('norm')">Multi-Norm prüfen</button>

    <h2>UI-Scanner</h2>
    <iframe src="UI-SCANNER.html" width="100%" height="400"></iframe>
</body>
</html>
