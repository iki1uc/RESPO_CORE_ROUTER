<!DOCTYPE html>
<html>
<head>
    <title>RESPO_CORE_ROUTER – System Router</title>
    <script src="router.js"></script>
</head>
<body>
    <h1>RESPO_CORE_ROUTER</h1>
    <p>Zentraler Router für alle RESPO‑Module.</p>

    <h2>Module</h2>
    <ul>
        <li>UI-Scanner</li>
        <li>ARG-SCAN</li>
        <li>POSITION-USER</li>
        <li>Rotation</li>
        <li>Multi-Norm</li>
        <li>AXI-Link</li>
    </ul>

    <h2>Aktionen</h2>
    <button onclick="route('scan')">Scan starten</button>
    <button onclick="route('ui')">UI aktualisieren</button>
    <button onclick="route('axi')">AXI-Link prüfen</button>

    <iframe src="UI-SCANNER.html" width="100%" height="400"></iframe>

    <script>
        function route(target) {
            console.log("Routing zu:", target);
            Router.route(target);
        }
    </script>
</body>
</html>
